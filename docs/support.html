<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SplitChaos Support</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f12;
      color: #f5f5f7;
      line-height: 1.6;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .card {
      background: #1a1a1f;
      border: 1px solid #2a2a31;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }
    p {
      margin: 0 0 16px;
      color: #d1d1d6;
    }
    a {
      color: #ff4d7d;
      text-decoration: none;
    }
    .email {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #25252c;
      font-weight: 600;
    }
    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #8e8e93;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>SplitChaos Support</h1>
      <p>If you need help with SplitChaos, have a bug report, or want to share feedback, reach out anytime.</p>
      <p>Email us at:</p>
      <a class="email" href="mailto:bansisavaj121@gmail.com">bansisavaj121@gmail.com</a>
      <p class="footer">
        Privacy Policy: <a href="https://bansisavaj.github.io/privacy.html">privacy.html</a><br>
        Terms of Use: <a href="https://bansisavaj.github.io/terms.html">terms.html</a>
      </p>
    </div>
  </div>
</body>
</html>
